{% extends 'base.html' %}

{% block content %}
<h2>Обратная связь</h2>

<form method="post">
    {% csrf_token %}

    <label>Имя:</label><br>
    <input type="text" name="name" required><br><br>

    <label>Сообщение:</label><br>
    <textarea name="message" required></textarea><br><br>

    <button type="submit">Отправить</button>
</form>

{% endblock %}
