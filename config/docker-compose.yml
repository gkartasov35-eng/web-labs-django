services:
  web:
    build: .
    container_name: web-lab-django
    ports:
      - "8080:8000"
    volumes:
      - .:/app
    environment:
      PORT: 8000
      DEBUG: 1
      SECRET_KEY: django-insecure-local-docker-key
      ALLOWED_HOSTS: 127.0.0.1,localhost
      CSRF_TRUSTED_ORIGINS: http://localhost:8080,http://127.0.0.1:8080
      DATABASE_URL: postgres://web_user:web_password@db:5432/web_labs_db
      NOTIFICATION_SERVICE_URL: http://notification-service:5000
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
    depends_on:
      db:
        condition: service_healthy
      notification-service:
        condition: service_started

  db:
    image: postgres:16
    container_name: web-lab-postgres
    environment:
      POSTGRES_DB: web_labs_db
      POSTGRES_USER: web_user
      POSTGRES_PASSWORD: web_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U web_user -d web_labs_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  notification-service:
    build: ./services/notification_service
    container_name: web-lab-notification
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
    ports:
      - "5000:5000"

volumes:
  postgres_data: